---
- name: Services - DNSMasq
  when: dnsmasq_management_method == 'disable'
  become: true
  ansible.builtin.service:
    name: dnsmasq
    state: stopped
    enabled: false

- name: Services - DNSMasq
  when: dnsmasq_management_method == 'bind'
  become: true
  notify: Restart dnsmasq service
  block:
    - name: Services - DNSMasq bind interfaces
      ansible.builtin.lineinfile:
        path: /etc/dnsmasq.conf
        line: bind-interfaces
        regexp: '^#?bind-interfaces'
        mode: "0644"

    - name: Services - DNSMasq ethernet interfaces
      ansible.builtin.lineinfile:
        path: /etc/dnsmasq.conf
        line: interface={{ interface }}
        insertafter: '^#?interface='
        mode: "0644"
      loop: |
        {{
          ansible_facts.interfaces |
          map('replace', '-', '_') |
          reject('search', '^vnet') |
          map('extract', ansible_facts) |
          selectattr('type', 'in', libvirt_dnsmasq_interface_types) |
          map(attribute='device')
        }}
      loop_control:
        loop_var: interface

- name: Services - Enable and start
  when: ansible_facts.service_mgr != 'systemd'
  become: true
  ansible.builtin.service:
    name: "{{ service }}"
    state: started
    enabled: true
  loop:
    - dbus
    - libvirtd
  loop_control:
    loop_var: service

- name: Services - Systemd
  when: ansible_facts.service_mgr == 'systemd'
  become: true
  block:
    - name: Services - List installed libvirt units  # noqa command-instead-of-module
      # service_facts only enumerates .service units, never .socket, so the
      # modular sockets would all be dropped. List the unit files directly to
      # match both services and sockets, then resolve the layout from them.
      ansible.builtin.command:
        cmd: systemctl list-unit-files --no-legend --type=service,socket
      register: libvirt_unit_files
      changed_when: false

    # Resolve the daemon layout (monolithic vs modular) from the units actually
    # installed rather than from the libvirt version -- Debian ships the
    # monolithic daemon even at 9.x. See filter_plugins/libvirt_units.py.
    - name: Services - Resolve the libvirt unit layout
      ansible.builtin.set_fact:
        libvirt_layout: "{{ libvirt_unit_files.stdout_lines | libvirt_units(libvirt_backends) }}"

    - name: Services - Register the libvirt daemons to restart
      # Restarting the *service* (not just the socket) is what makes a
      # libvirtd.conf change take effect; the "Restart libvirt service" handler
      # consumes this list.
      ansible.builtin.set_fact:
        libvirt_restart_units: "{{ libvirt_layout.restart_units }}"

    - name: Services - Enable and start
      ansible.builtin.systemd:
        name: "{{ unit }}"
        state: started
        enabled: true
      loop: "{{ libvirt_layout.boot_units }}"
      loop_control:
        loop_var: unit
