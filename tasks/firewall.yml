---
- name: Firewall
  become: true
  block:
    - name: Firewall - Services
      ansible.posix.firewalld:
        service: "{{ service }}"
        state: enabled
        zone: "{{ libvirt_firewall_zone | default(omit) }}"
        immediate: true
        permanent: true
      # libvirt-tls (port 16514) is only opened when the daemon actually listens
      # on TLS; the plain libvirt service is always needed.
      loop: "{{ ['libvirt'] + (['libvirt-tls'] if listen_tls else []) }}"
      vars:
        listen_tls: "{{ (((libvirt_config | default({})).libvirtd | default({})).listen_tls | default(0)) | int == 1 }}"
      loop_control:
        loop_var: service

    - name: Firewall - TCP ports range for domain migration
      ansible.posix.firewalld:
        port: 49152-49215/tcp
        state: enabled
        zone: "{{ libvirt_firewall_zone | default(omit) }}"
        immediate: true
        permanent: true

    - name: Firewall - Backend
      when: firewall_backend is defined
      block:
        - name: Firewall - Backend - Packages
          ansible.builtin.package:
            name: "{{ firewall_backend }}"
            state: present

        - name: Firewall - Backend - Firewalld configuration
          ansible.builtin.lineinfile:
            path: /etc/firewalld/firewalld.conf
            line: FirewallBackend={{ firewall_backend }}
            regexp: FirewallBackend=
          notify: Restart firewalld service

- name: Firewall - Flush handlers
  ansible.builtin.meta: flush_handlers
