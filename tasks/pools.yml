---
- name: Pools - Facts
  community.libvirt.virt_pool:
    command: facts
    uri: "{{ libvirt_uri }}"

- name: Pools - Items
  ansible.builtin.set_fact:
    libvirt_pools_input: "{{ libvirt_pools }}"

- name: Pools - Create
  ansible.builtin.include_tasks: "{{ role_path }}/tasks/pools/create.yml"
  vars:
    libvirt_pools: |
      {{
        (
          (libvirt_pools_input | selectattr('state', 'undefined'))
        + (libvirt_pools_input | selectattr('state', 'defined') | selectattr('state', 'in', ['active', 'present']))
        ) | rejectattr('name', 'in', ansible_facts.ansible_libvirt_pools)
      }}

- name: Pools - Update facts
  community.libvirt.virt_pool:
    command: facts
    uri: "{{ libvirt_uri }}"

- name: Pools - Autostart
  community.libvirt.virt_pool:
    name: "{{ pool.name }}"
    autostart: "{{ pool.autostart }}"
    uri: "{{ libvirt_uri }}"
  loop: |
    {{
      (
        (libvirt_pools | selectattr('state', 'undefined'))
      + (libvirt_pools | selectattr('state', 'defined') | selectattr('state', 'in', ['active', 'present']))
      ) | selectattr('autostart', 'defined')
    }}
  loop_control:
    loop_var: pool

- name: Pools - Status
  community.libvirt.virt_pool:
    name: "{{ pool.name }}"
    state: "{{ pool.state | default('active') }}"
    uri: "{{ libvirt_uri }}"
  loop: "{{ libvirt_pools }}"
  loop_control:
    loop_var: pool

- name: Pools - Allow qemu to reach pools located under a user home
  when: system_wide
  ansible.builtin.include_tasks: "{{ role_path }}/tasks/pools/grant-traversal.yml"
  loop: "{{ libvirt_pools_input }}"
  loop_control:
    loop_var: libvirt_pool
