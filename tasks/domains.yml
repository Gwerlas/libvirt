---
- name: Domains - Validate disk targets
  vars:
    domain: "{{ item.0 }}"
    disk: "{{ item.1 }}"
  ansible.builtin.assert:
    that:
      - disk.target | default('vda') is match('(vd|hd)')
    fail_msg: >-
      Disk target '{{ disk.target | default('vda') }}' on domain
      '{{ domain.name }}': only virtio (vd*) and ide (hd*) disks are supported
      for now; sata/scsi/usb (sd*) will be added later.
    quiet: true
  loop: "{{ domains | subelements('disks', skip_missing=true) }}"
  loop_control:
    label: "{{ domain.name }}: {{ disk.target | default('vda') }}"

- name: Domains - List VMs
  community.libvirt.virt:
    command: list_vms
    uri: "{{ libvirt_uri }}"
  register: result
  check_mode: false

- name: Domains - Create domain
  community.libvirt.virt:
    command: define
    xml: "{{ lookup('template', 'domain.xml.j2') }}"
    uri: "{{ libvirt_uri }}"
  loop: |
    {{
      (
        (domains | selectattr('state', 'undefined'))
      + (domains | selectattr('state', 'defined') | selectattr('state', '!=', 'destroyed'))
      ) | rejectattr('name', 'in', result.list_vms)
    }}
  loop_control:
    loop_var: domain

- name: Domains - Autostart
  community.libvirt.virt:
    name: "{{ domain.name }}"
    autostart: "{{ domain.autostart | default(true) }}"
    uri: "{{ libvirt_uri }}"
  loop: "{{ domains }}"
  loop_control:
    loop_var: domain

- name: Domains - State
  community.libvirt.virt:
    name: "{{ domain.name }}"
    state: "{{ domain.state | default('running') }}"
    uri: "{{ libvirt_uri }}"
  loop: "{{ domains }}"
  loop_control:
    loop_var: domain
