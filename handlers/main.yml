---
- name: Rebuild with new use flags
  listen:
    - emerge --deep --newuse
  become: true
  community.general.portage:
    package: "{{ packages_computed }}"
    deep: true
    newuse: true

- name: Restart dnsmasq service
  listen:
    - restart dnsmasq
  become: true
  ansible.builtin.service:
    name: dnsmasq
    state: restarted

# A full `restart` of the system bus drops every client (logind, the X/gdm
# session, ...) and wedges the desktop. dbus re-reads its policy files on SIGHUP,
# so a reload is enough to pick up libvirt's freshly installed dbus config.
- name: Reload dbus service
  listen:
    - emerge --deep --newuse
  become: true
  ansible.builtin.service:
    name: dbus
    state: reloaded

- name: Restart libvirt service
  listen:
    - emerge --deep --newuse
    - Restart libvirt service
  become: true
  ansible.builtin.service:
    name: libvirtd
    state: restarted
  when: ansible_facts.service_mgr != 'systemd'

# Restarting the *service* (not just the socket) is what makes a libvirtd.conf
# change take effect; libvirt_layout.restart_units (from tasks/services.yml) is
# the list of daemons to restart for the detected layout.
- name: Restart libvirt daemons
  listen:
    - emerge --deep --newuse
    - Restart libvirt service
  become: true
  ansible.builtin.systemd:
    name: "{{ unit }}"
    state: restarted
  loop: "{{ (libvirt_layout | default({})).restart_units | default([]) }}"
  loop_control:
    loop_var: unit
  when:
    - ansible_facts.service_mgr == 'systemd'
    - (libvirt_layout | default({})).restart_units | default([]) | length > 0

- name: Wait for libvirtd ready
  listen:
    - emerge --deep --newuse
    - Restart libvirt service
  become: true
  ansible.builtin.command:
    cmd: virsh -c qemu:///system version
  register: result
  until: not result.failed
  changed_when: false

- name: Restart firewalld service
  when:
    - libvirt_manage_firewall
    - "'libvirtd' in libvirt_install"
  become: true
  ansible.builtin.service:
    name: firewalld
    state: restarted
