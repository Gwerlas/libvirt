---
- name: Rebuild with new use flags
  listen:
    - emerge --deep --newuse
  become: true
  community.general.portage:
    package: "{{ packages_computed }}"
    deep: true
    newuse: true

- name: Restart dnsmasq service
  listen:
    - restart dnsmasq
  become: true
  ansible.builtin.service:
    name: dnsmasq
    state: restarted

# A full `restart` of the system bus drops every client (logind, the X/gdm
# session, ...) and wedges the desktop. dbus re-reads its policy files on SIGHUP,
# so a reload is enough to pick up libvirt's freshly installed dbus config.
- name: Reload dbus service
  listen:
    - emerge --deep --newuse
  become: true
  ansible.builtin.service:
    name: dbus
    state: reloaded

- name: Get libvirtd version
  listen:
    - emerge --deep --newuse
    - Restart libvirt service
  when:
    - ansible_facts.service_mgr == 'systemd'
    - libvirtd_version is not defined
  environment:
    PATH: /usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:/bin:/sbin
  ansible.builtin.command:
    cmd: libvirtd -V
  register: _libvirtd_version_result
  failed_when: false
  changed_when: false
  check_mode: false

- name: Get libvirtd version (virtlogd fallback)
  listen:
    - emerge --deep --newuse
    - Restart libvirt service
  when:
    - ansible_facts.service_mgr == 'systemd'
    - libvirtd_version is not defined
    - _libvirtd_version_result is defined
    - _libvirtd_version_result.rc != 0
  environment:
    PATH: /usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:/bin:/sbin
  ansible.builtin.command:
    cmd: virtlogd -V
  register: _libvirtd_version_result
  changed_when: false
  check_mode: false

- name: Set libvirtd version fact
  listen:
    - emerge --deep --newuse
    - Restart libvirt service
  when:
    - ansible_facts.service_mgr == 'systemd'
    - libvirtd_version is not defined
    - _libvirtd_version_result is defined
    - _libvirtd_version_result.rc == 0
  ansible.builtin.set_fact:
    libvirtd_version: "{{ _libvirtd_version_result.stdout | split(' ') | last }}"

- name: Restart libvirt service
  listen:
    - emerge --deep --newuse
    - Restart libvirt service
  become: true
  ansible.builtin.service:
    name: libvirtd
    state: restarted
  when: ansible_facts.service_mgr != 'systemd'

- name: Restart libvirt daemons
  listen:
    - emerge --deep --newuse
    - Restart libvirt service
  become: true
  ansible.builtin.systemd:
    name: "{{ unit }}"
    state: restarted
  loop: "{{ libvirt_restart_units | default([]) }}"
  loop_control:
    loop_var: unit
  when:
    - ansible_facts.service_mgr == 'systemd'
    - libvirt_restart_units | default([]) | length > 0

- name: Wait for libvirtd ready
  listen:
    - emerge --deep --newuse
    - Restart libvirt service
  become: true
  ansible.builtin.command:
    cmd: virsh -c qemu:///system version
  register: result
  until: not result.failed
  changed_when: false

- name: Restart firewalld service
  when:
    - libvirt_manage_firewall
    - "'libvirtd' in libvirt_install"
  become: true
  ansible.builtin.service:
    name: firewalld
    state: restarted
