workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
      changes:
        - defaults/*
        - files/**/*
        - filter_plugins/**/*
        - handlers/*
        - meta/*
        - molecule/**/*
        - tasks/**/*
        - templates/**/*
        - tests/**/*
        - vars/**/*

lint:
  image: gwerlas/ansible-lint
  script: ansible-lint

unit:
  image: python:3
  before_script:
    - pip install --quiet pytest
  script: python -m pytest tests/unit
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - filter_plugins/**/*
        - tests/**/*

import:
  stage: deploy
  image: gwerlas/ansible
  script: ansible-galaxy role import --token $GALAXY_TOKEN Gwerlas libvirt
  rules:
    - if: '$CI_COMMIT_REF_PROTECTED == "true" && $CI_COMMIT_TAG'
