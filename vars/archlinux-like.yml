---
usrs:
  qemu: libvirt-qemu

grps:
  qemu: libvirt-qemu

packages:
  libvirtd:
    # bridge-utils (brctl) is gone from Arch repos and unneeded: modern libvirt
    # manages bridges through netlink (iproute2).
    - dnsmasq
    - libvirt
    - libvirt-python
    - openbsd-netcat
    - python-lxml
  clients:
    - libvirt
    - virt-install
  virt-manager:
    - virt-manager
  gnome-boxes:
    - gnome-boxes
  qemu:
    - qemu-full
