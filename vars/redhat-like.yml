---
packages:
  libvirtd:
    # bridge-utils (brctl) was dropped from EL9+ and is no longer needed:
    # modern libvirt manages bridges through netlink (iproute).
    - libvirt-daemon
    - python3-lxml
    - python3-libvirt
  clients:
    - libvirt-client
    - virt-install
  "virt-manager":
    - virt-manager
  "gnome-boxes":
    - gnome-boxes
  qemu:
    # - qemu-kvm
    - libvirt-daemon-kvm
    - libvirt-daemon-config-network
    - libvirt-daemon-driver-network
    - libvirt-daemon-driver-qemu
    - libvirt-daemon-driver-storage-core
