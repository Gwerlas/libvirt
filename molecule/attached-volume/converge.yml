---
- name: Attach a volume to a domain
  hosts: all
  roles:
    - role: gwerlas.libvirt
      vars:
        libvirt_domains:
          - name: my-node
            type: qemu
            memory: 128M
            cpu:
              mode: custom
            disks:
              - name: os
              - name: data
                capacity: 2G
                target: vdb
              - name: legacy
                capacity: 1G
                target: hda
            interfaces:
              - type: user
