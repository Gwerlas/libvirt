---
# Cloud-image catalogue for the libvirt-driven Molecule scenarios. Each
# scenario's molecule.yml picks a subset by name and provides groups / memory /
# extra_disks overrides; create.yml looks up image_url (or image_latest for
# rolling releases) here.
platforms:
  # Arch Linux — rolling, official cloud image
  - name: archlinux
    image_url: https://geo.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2

  # Debian — stable + oldstable
  - name: bookworm
    # Debian 12's `genericcloud` variant has no EFI bootloader — use `generic`
    image_url: https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-amd64.qcow2
  - name: trixie
    image_url: https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-amd64.qcow2

  # Ubuntu — LTS still supported
  - name: jammy
    image_url: https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img
  - name: noble
    image_url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img

  # EL — 9 and 10 streams
  - name: centos9s
    image_url: https://cloud.centos.org/centos/9-stream/x86_64/images/CentOS-Stream-GenericCloud-9-latest.x86_64.qcow2
  - name: alma9
    image_url: https://repo.almalinux.org/almalinux/9/cloud/x86_64/images/AlmaLinux-9-GenericCloud-latest.x86_64.qcow2
  - name: centos10s
    image_url: https://cloud.centos.org/centos/10-stream/x86_64/images/CentOS-Stream-GenericCloud-10-latest.x86_64.qcow2
  - name: alma10
    image_url: https://repo.almalinux.org/almalinux/10/cloud/x86_64/images/AlmaLinux-10-GenericCloud-latest.x86_64.qcow2

  # Fedora — N and N-1
  - name: fedora43
    image_url: https://download.fedoraproject.org/pub/fedora/linux/releases/43/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2
  - name: fedora44
    image_url: https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-44-1.7.x86_64.qcow2

  # Gentoo — rolling, pinned to a specific cloudinit autobuild
  - name: gentoo
    # Gentoo's cloudinit image ships only the EFI bootloader, no BIOS GRUB
    firmware: efi
    # Rolling: autobuilds are pruned after a few weeks, so don't pin a timestamp
    # (it 404s). create.yml resolves the current image from this pointer file.
    image_latest: https://distfiles.gentoo.org/releases/amd64/autobuilds/latest-di-amd64-cloudinit.txt
